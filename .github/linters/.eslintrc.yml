---
root: true

env:
  browser: true
  es2021: true
  jest: true
  node: true
extends:
  - 'plugin:react/recommended'
  - 'plugin:react-hooks/recommended'
  - 'plugin:json/recommended'
  - 'eslint:recommended'
parser: '@typescript-eslint/parser'
parserOptions:
  ecmaFeatures:
    jsx: true
  ecmaVersion: 12
  sourceType: module
plugins:
  - "@typescript-eslint"
  - react
rules:
  semi:
    - error
    - always
  react/prop-types:
    - off
  no-use-before-define:
    - off
  quotes:
    - error
    - single
  "@typescript-eslint/no-use-before-define":
    - error
  no-unused-vars:
    - off
  "@typescript-eslint/no-unused-vars":
    - error
settings:
  react:
    version: detect
globals:
  window: true
  process: true
  module: true
